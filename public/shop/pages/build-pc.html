<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Build PC - HL TechMart</title><script src="/assets/js/config.js"></script><script src="/assets/js/api.js"></script><link rel="stylesheet" href="/assets/css/00-variables.css"><link rel="stylesheet" href="/assets/css/01-layout.css"><link rel="stylesheet" href="/assets/css/02-components.css"><link rel="stylesheet" href="/assets/css/03-pages.css"><link rel="stylesheet" href="/assets/css/04-responsive.css"></head><body class="hl-page"><main class="hl-container"><div class="feature-nav"><a href="/">Trang chủ</a><a href="/pages/san-pham.html">Sản phẩm</a><a href="/pages/build-pc.html">Build PC</a><a href="/pages/tra-cuu-don-hang.html">Tra cứu đơn</a><a href="/pages/bao-hanh.html">Bảo hành</a><a href="/pages/khuyen-mai.html">Khuyến mãi</a><a href="/pages/lien-he.html">Liên hệ</a><a href="/admin/">Admin</a></div><script src="/assets/js/buildpc.js"></script><section class="feature-hero"><span class="hl-chip">🧩 Build PC</span><h1>Gợi ý cấu hình PC theo ngân sách</h1><p>Chọn ngân sách để hệ thống gợi ý linh kiện từ dữ liệu Admin.</p></section><section class="hl-section"><div class="hl-grid-3"><button class="hl-btn" onclick="suggest(10000000)">10 triệu</button><button class="hl-btn" onclick="suggest(20000000)">20 triệu</button><button class="hl-btn" onclick="suggest(35000000)">35 triệu</button></div><div id="result" style="margin-top:18px"></div></section><script>let products=[];async function load(){const d=await hlGetData();products=d.products||[]}function money(n){return Number(n||0).toLocaleString('vi-VN')+'đ'}function suggest(b){const items=hlBuildSuggest(products,b);document.getElementById('result').innerHTML=`<h2>Gợi ý cho ngân sách ${money(b)}</h2><table class="hl-table"><tbody>${items.map(x=>`<tr><td><b>${x.category}</b></td><td>${x.name}</td><td>${money(x.salePrice||x.price)}</td></tr>`).join('')}</tbody></table>`}load()</script></main><script src="/assets/js/ui.js"></script></body></html>
