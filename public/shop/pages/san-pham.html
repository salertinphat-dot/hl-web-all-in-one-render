<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sản phẩm - HL TechMart</title><script src="/assets/js/config.js"></script><script src="/assets/js/api.js"></script><link rel="stylesheet" href="/assets/css/00-variables.css"><link rel="stylesheet" href="/assets/css/01-layout.css"><link rel="stylesheet" href="/assets/css/02-components.css"><link rel="stylesheet" href="/assets/css/03-pages.css"><link rel="stylesheet" href="/assets/css/04-responsive.css"></head><body class="hl-page"><main class="hl-container"><div class="feature-nav"><a href="/">Trang chủ</a><a href="/pages/san-pham.html">Sản phẩm</a><a href="/pages/build-pc.html">Build PC</a><a href="/pages/tra-cuu-don-hang.html">Tra cứu đơn</a><a href="/pages/bao-hanh.html">Bảo hành</a><a href="/pages/khuyen-mai.html">Khuyến mãi</a><a href="/pages/lien-he.html">Liên hệ</a><a href="/admin/">Admin</a></div><section class="feature-hero"><span class="hl-chip">📦 Sản phẩm</span><h1>Danh sách linh kiện đang bán</h1><p>Dữ liệu lấy trực tiếp từ Admin. Máy A sửa thì máy B tải lại sẽ thấy.</p></section><section class="hl-section"><input class="hl-input" id="q" placeholder="Tìm sản phẩm..." oninput="render()"><div id="list" class="hl-grid-4" style="margin-top:16px"></div></section><script>let products=[];async function load(){const d=await hlGetData();products=(d.products||[]).filter(x=>x.isActive!==false);render()}function money(n){return Number(n||0).toLocaleString('vi-VN')+'đ'}function render(){const q=document.getElementById('q').value.toLowerCase();document.getElementById('list').innerHTML=products.filter(p=>!q||JSON.stringify(p).toLowerCase().includes(q)).map(p=>`<div class="hl-card"><div class="hl-chip">${p.category||'Linh kiện'}</div><h3>${p.name}</h3><p class="hl-muted">${p.description||''}</p><h2 style="color:#e11d48">${money(p.salePrice||p.price)}</h2><p class="hl-muted">SKU: ${p.sku||''} · Tồn: ${p.stock||0}</p></div>`).join('')||'<p>Chưa có sản phẩm</p>'}load()</script></main><script src="/assets/js/ui.js"></script></body></html>
