<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Tra cứu đơn hàng - HL TechMart</title><script src="/assets/js/config.js"></script><script src="/assets/js/api.js"></script><link rel="stylesheet" href="/assets/css/00-variables.css"><link rel="stylesheet" href="/assets/css/01-layout.css"><link rel="stylesheet" href="/assets/css/02-components.css"><link rel="stylesheet" href="/assets/css/03-pages.css"><link rel="stylesheet" href="/assets/css/04-responsive.css"></head><body class="hl-page"><main class="hl-container"><div class="feature-nav"><a href="/">Trang chủ</a><a href="/pages/san-pham.html">Sản phẩm</a><a href="/pages/build-pc.html">Build PC</a><a href="/pages/tra-cuu-don-hang.html">Tra cứu đơn</a><a href="/pages/bao-hanh.html">Bảo hành</a><a href="/pages/khuyen-mai.html">Khuyến mãi</a><a href="/pages/lien-he.html">Liên hệ</a><a href="/admin/">Admin</a></div><section class="feature-hero"><span class="hl-chip">🔎 Tra cứu</span><h1>Tra cứu đơn hàng</h1><p>Nhập số điện thoại hoặc mã đơn để xem tình trạng đơn hàng.</p></section><section class="hl-section"><input class="hl-input" id="q" placeholder="Nhập số điện thoại / mã đơn"><button class="hl-btn" style="margin-top:12px" onclick="lookup()">Tra cứu</button><div id="result" style="margin-top:18px"></div></section><script>async function lookup(){const q=document.getElementById('q').value.trim().toLowerCase();const d=await hlGetData();const orders=(d.orders||[]).filter(o=>JSON.stringify(o).toLowerCase().includes(q));document.getElementById('result').innerHTML=orders.length?`<table class="hl-table"><tbody>${orders.map(o=>`<tr><td><b>#${o.id||o.code||''}</b></td><td>${o.customerName||o.name||''}</td><td>${o.phone||o.customerPhone||''}</td><td>${o.status||'Mới'}</td></tr>`).join('')}</tbody></table>`:'<p class="hl-muted">Không tìm thấy đơn hàng.</p>'}</script></main><script src="/assets/js/ui.js"></script></body></html>
